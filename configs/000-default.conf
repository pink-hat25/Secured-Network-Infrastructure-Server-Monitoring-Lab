# ============================================================
# Project  : Secured Network Infrastructure & Server Monitoring Lab
# Service  : Apache2
# File     : 000-default.conf
# ============================================================

<VirtualHost *:80>

    ServerAdmin pnkht@lab-smk

    ServerName www.lab-smk.xyz

    ServerAlias lab-smk.xyz

    DocumentRoot /var/www/html/lab-smk
    
    Redirect / https://lab-smk.xyz

    ErrorLog ${APACHE_LOG_DIR}/error.log

    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
