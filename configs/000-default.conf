# ============================================================
# Project  : Secured Network Infrastructure & Server Monitoring Lab
# Service  : Apache2
# File     : 000-default.conf
# ============================================================

<VirtualHost *:80>

    ServerAdmin pnkht@lab

    ServerName www.pnkht-lab.xyz

    ServerAlias pnkht-lab.xyz

    DocumentRoot /var/www/html/pnkht-lab
    
    Redirect / https://pnkht-lab.xyz

    ErrorLog ${APACHE_LOG_DIR}/error.log

    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
